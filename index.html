<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poshan Darpan - Precise Growth Analysis</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f0f4f8; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 15px; }
        .app-card { max-width: 500px; margin: auto; background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .header { background: #1e40af; color: white; padding: 25px; text-align: center; }
        .form-body { padding: 25px; }
        .input-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; color: #374151; margin-bottom: 8px; }
        input, select { width: 100%; padding: 12px; border: 2px solid #e5e7eb; border-radius: 10px; font-size: 16px; outline: none; }
        input:focus { border-color: #3b82f6; }
        .btn-check { width: 100%; background: #3b82f6; color: white; border: none; padding: 15px; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-check:hover { background: #2563eb; }
        
        .result-overlay { margin-top: 20px; padding: 20px; border-radius: 15px; display: none; text-align: center; }
        .status-1 { background: #fee2e2; color: #b91c1c; border: 2px solid #ef4444; } /* SAM */
        .status-2 { background: #ffedd5; color: #9a3412; border: 2px solid #f97316; } /* MAM */
        .status-3 { background: #dcfce7; color: #15803d; border: 2px solid #22c55e; } /* Normal */
        .status-4 { background: #fef9c3; color: #854d0e; border: 2px solid #eab308; } /* Overweight */
        .status-5 { background: #fee2e2; color: #991b1b; border: 2px solid #dc2626; } /* Obesity */
        
        footer { text-align: center; margin-top: 20px; font-size: 12px; color: #6b7280; }
    </style>
</head>
<body>

<div class="app-card">
    <div class="header">
        <h2>Poshan Darpan</h2>
        <p>Precise Nutritional Status Lookup</p>
    </div>
    
    <div class="form-body">
        <div class="input-group">
            <label>Age (Months)</label>
            <input type="number" id="age" placeholder="0-59">
        </div>
        <div class="input-group">
            <label>Sex (1=Male, 2=Female)</label>
            <select id="sex">
                <option value="1">1</option>
                <option value="2">2</option>
            </select>
        </div>
        <div class="input-group">
            <label>Height (cm)</label>
            <input type="number" id="height" step="1" placeholder="e.g. 45">
        </div>
        <div class="input-group">
            <label>Weight (kg)</label>
            <input type="number" id="weight" step="0.1" placeholder="e.g. 2.5">
        </div>
        
        <button class="btn-check" onclick="performLookup()">Check Status</button>
        
        <div id="resultBox" class="result-overlay">
            <h3 id="statusLabel"></h3>
            <p id="dataRef" style="font-size: 14px; margin-top: 5px;"></p>
        </div>
    </div>
</div>

<footer>
    <p>Reference: Data.csv | Status Categories: 1-SAM, 2-MAM, 3-Normal, 4-Overweight, 5-Obesity</p>
</footer>

<script>
    async function performLookup() {
        const uAge = parseInt(document.getElementById('age').value);
        const uSex = parseInt(document.getElementById('sex').value);
        const uHeight = parseInt(document.getElementById('height').value);
        const uWeight = parseFloat(document.getElementById('weight').value).toFixed(1);

        const resBox = document.getElementById('resultBox');
        const sLabel = document.getElementById('statusLabel');
        const dRef = document.getElementById('dataRef');

        try {
            const response = await fetch('Data.csv');
            const csvText = await response.text();
            const lines = csvText.split('\n');
            
            let finalStatus = null;

            // Iterate through data to find exact match for Age, Sex, Height, and Weight
            for (let i = 1; i < lines.length; i++) {
                const cols = lines[i].split(',');
                if (cols.length < 5) continue;

                // Column Index: 0=Age, 1=Sex, 2=Height, 3=Weight, 4=Status
                const cAge = parseInt(cols[0]);
                const cSex = parseInt(cols[1]);
                const cHeight = parseInt(cols[2]);
                const cWeight = parseFloat(cols[3]).toFixed(1);
                const cStatus = parseInt(cols[4]);

                if (cAge === uAge && cSex === uSex && cHeight === uHeight && cWeight === uWeight) {
                    finalStatus = cStatus;
                    break;
                }
            }

            if (finalStatus !== null) {
                const names = {
                    1: "SAM (Severe Acute Malnutrition)",
                    2: "MAM (Moderate Acute Malnutrition)",
                    3: "Normal Growth",
                    4: "Overweight",
                    5: "Obesity"
                };

                resBox.style.display = "block";
                resBox.className = `result-overlay status-${finalStatus}`;
                sLabel.innerText = names[finalStatus];
                dRef.innerText = `Matched Record: ${uAge}m, ${uSex===1?'M':'F'}, ${uHeight}cm, ${uWeight}kg`;
            } else {
                alert("No exact match found in Data.csv for these specific measurements.");
            }

        } catch (err) {
            alert("Error loading Data.csv. Please ensure the file is in the same folder.");
        }
    }
</script>

</body>
</html>
