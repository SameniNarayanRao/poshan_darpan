<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WHO WHZ Calculator (0–59 Months)</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f6f8;
        padding: 20px;
    }
    .container {
        max-width: 520px;
        background: #ffffff;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h2 {
        text-align: center;
        color: #2c3e50;
    }
    label {
        display: block;
        margin-top: 12px;
        font-weight: bold;
    }
    input, select, button {
        width: 100%;
        padding: 8px;
        margin-top: 6px;
        font-size: 14px;
    }
    button {
        margin-top: 16px;
        background: #007bff;
        color: white;
        border: none;
        cursor: pointer;
        border-radius: 4px;
    }
    button:hover {
        background: #0056b3;
    }
    .result {
        margin-top: 20px;
        padding: 12px;
        background: #eef3f7;
        border-radius: 5px;
        font-size: 15px;
    }
    .category {
        font-weight: bold;
        font-size: 18px;
    }
</style>
</head>
<body>

<div class="container">
    <h2>Weight-for-Height Z-Score (WHZ)</h2>

    <label>Sex</label>
    <select id="sex">
        <option value="male">Male</option>
        <option value="female">Female</option>
    </select>

    <label>Height (cm)</label>
    <input type="number" id="height" step="0.1">

    <label>Weight (kg)</label>
    <input type="number" id="weight" step="0.1">

    <button onclick="calculateWHZ()">Calculate WHZ</button>

    <div class="result" id="output"></div>
</div>

<script>
/*
-------------------------------------------------
 SAMPLE WHO-STYLE LMS DATA (DEMO ONLY)
 Replace this object with the full WHO WHZ tables
-------------------------------------------------
*/

const LMS = {
    male: [
        {h: 65, L: -0.3521, M: 7.4,  S: 0.0823},
        {h: 70, L: -0.3521, M: 8.9,  S: 0.0820},
        {h: 75, L: -0.3521, M: 10.1, S: 0.0817},
        {h: 80, L: -0.3521, M: 11.3, S: 0.0815},
        {h: 85, L: -0.3521, M: 12.6, S: 0.0812}
    ],
    female: [
        {h: 65, L: -0.3833, M: 7.0,  S: 0.0850},
        {h: 70, L: -0.3833, M: 8.4,  S: 0.0846},
        {h: 75, L: -0.3833, M: 9.6,  S: 0.0842},
        {h: 80, L: -0.3833, M: 10.8, S: 0.0839},
        {h: 85, L: -0.3833, M: 12.0, S: 0.0836}
    ]
};

/* Linear interpolation for LMS */
function interpolateLMS(sex, height) {
    const table = LMS[sex];

    for (let i = 0; i < table.length - 1; i++) {
        if (height >= table[i].h && height <= table[i + 1].h) {
            const r = (height - table[i].h) / (table[i + 1].h - table[i].h);
            return {
                L: table[i].L + r * (table[i + 1].L - table[i].L),
                M: table[i].M + r * (table[i + 1].M - table[i].M),
                S: table[i].S + r * (table[i + 1].S - table[i].S)
            };
        }
    }
    return null;
}

/* WHO Z-score formula */
function calculateWHZ() {
    const sex = document.getElementById("sex").value;
    const height = parseFloat(document.getElementById("height").value);
    const weight = parseFloat(document.getElementById("weight").value);
    const out = document.getElementById("output");

    if (!height || !weight) {
        out.innerHTML = "Please enter valid height and weight.";
        return;
    }

    const lms = interpolateLMS(sex, height);
    if (!lms) {
        out.innerHTML = "Height outside demo reference range (65–85 cm).";
        return;
    }

    const {L, M, S} = lms;
    const z = (Math.pow(weight / M, L) - 1) / (L * S);

    let category = "";
    if (z < -3) category = "Severe Acute Malnutrition (SAM)";
    else if (z < -2) category = "Moderate Acute Malnutrition (MAM)";
    else if (z <= 1) category = "Normal";
    else if (z <= 2) category = "Overweight";
    else category = "Obesity";

    out.innerHTML = `
        <strong>WHZ Score:</strong> ${z.toFixed(2)} <br>
        <span class="category">Category: ${category}</span>
    `;
}
</script>

</body>
</html>
