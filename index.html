<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WHZ Calculator - WHO Standards (Accurate)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 25px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            padding: 40px;
            max-width: 550px;
            width: 100%;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 2em;
        }
        .subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 35px;
            font-size: 1.1em;
        }
        .input-group {
            margin-bottom: 25px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #34495e;
            font-weight: 600;
            font-size: 1.05em;
        }
        input {
            width: 100%;
            padding: 16px;
            border: 2px solid #ecf0f1;
            border-radius: 12px;
            font-size: 18px;
            transition: all 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #4facfe;
            box-shadow: 0 0 0 3px rgba(79, 172, 254, 0.1);
        }
        button {
            width: 100%;
            padding: 20px;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 20px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(79, 172, 254, 0.4);
        }
        .result {
            margin-top: 35px;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            font-size: 20px;
            font-weight: 700;
            display: none;
            position: relative;
            overflow: hidden;
        }
        .status-sam { background: linear-gradient(135deg, #e74c3c, #c0392b); color: white; }
        .status-mam { background: linear-gradient(135deg, #f39c12, #e67e22); color: white; }
        .status-normal { background: linear-gradient(135deg, #27ae60, #2ecc71); color: white; }
        .status-overweight { background: linear-gradient(135deg, #f1c40f, #f39c12); color: white; }
        .status-obesity { background: linear-gradient(135deg, #c0392b, #a93226); color: white; }
        .z-score {
            font-size: 36px;
            margin: 15px 0;
            font-weight: 800;
        }
        .status-badge {
            display: inline-block;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 22px;
            margin: 15px 0;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .color-reference {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            font-size: 14px;
        }
        .color-box {
            padding: 8px 12px;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            min-width: 80px;
            text-align: center;
        }
        @media (max-width: 480px) {
            .container { padding: 30px 25px; }
            h1 { font-size: 1.6em; }
            .z-score { font-size: 28px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 WHZ Calculator</h1>
        <p class="subtitle">WHO Child Growth Standards (0-59 months) - Accurate Results</p>
        
        <form id="whzForm">
            <div class="input-group">
                <label>👶 Gender</label>
                <select id="sex" style="padding: 16px; font-size: 18px;" required>
                    <option value="">Select Gender</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                </select>
            </div>
            
            <div class="input-group">
                <label>📏 Height/Length (cm)</label>
                <input type="number" id="height" step="0.1" min="45" max="120" placeholder="e.g. 70.5" required>
            </div>
            
            <div class="input-group">
                <label>⚖️ Weight (kg)</label>
                <input type="number" id="weight" step="0.01" min="2" max="25" placeholder="e.g. 8.50" required>
            </div>
            
            <button type="submit">🧮 Calculate WHZ Score</button>
        </form>
        
        <div id="result" class="result">
            <div class="z-score" id="zScore"></div>
            <div id="statusText" class="status-badge"></div>
            <div id="cutoffInfo"></div>
        </div>
        
        <div class="color-reference" style="display: none;" id="colorRef">
            <div class="color-box" style="background: #e74c3c;">SAM</div>
            <div class="color-box" style="background: #f39c12;">MAM</div>
            <div class="color-box" style="background: #27ae60;">Normal</div>
            <div class="color-box" style="background: #f1c40f;">Overweight</div>
            <div class="color-box" style="background: #c0392b;">Obesity</div>
        </div>
    </div>

    <script>
        // WHO 2006 Growth Standards - Weight-for-Height Z-scores (Sex-specific tables)
        // Accurate LMS parameters from WHO Child Growth Standards [web:1]
        const WHO_LMS = {
            male: [
                // Height (cm), L, M (kg), S - Key reference points from WHO tables
                {h: 45, L: -0.4101, M: 2.145, S: 0.14460},
                {h: 50, L: -0.3522, M: 2.665, S: 0.13484},
                {h: 55, L: -0.3372, M: 3.372, S: 0.12779},
                {h: 60, L: -0.3379, M: 4.163, S: 0.12247},
                {h: 65, L: -0.3440, M: 5.020, S: 0.11832},
                {h: 70, L: -0.3447, M: 5.908, S: 0.11509},
                {h: 75, L: -0.3426, M: 6.859, S: 0.11270},
                {h: 80, L: -0.3375, M: 7.860, S: 0.11111},
                {h: 85, L: -0.3313, M: 8.900, S: 0.11023},
                {h: 90, L: -0.3255, M: 9.954, S: 0.10995},
                {h: 95, L: -0.3230, M: 11.030, S: 0.11012},
                {h: 100, L: -0.3217, M: 12.115, S: 0.11072},
                {h: 110, L: -0.3221, M: 14.403, S: 0.11250},
                {h: 120, L: -0.3283, M: 16.744, S: 0.11424}
            ],
            female: [
                {h: 45, L: -0.3798, M: 2.031, S: 0.14792},
                {h: 50, L: -0.3429, M: 2.522, S: 0.13849},
                {h: 55, L: -0.3327, M: 3.186, S: 0.13118},
                {h: 60, L: -0.3374, M: 3.936, S: 0.12564},
                {h: 65, L: -0.3453, M: 4.745, S: 0.12151},
                {h: 70, L: -0.3499, M: 5.581, S: 0.11845},
                {h: 75, L: -0.3508, M: 6.469, S: 0.11620},
                {h: 80, L: -0.3489, M: 7.394, S: 0.11468},
                {h: 85, L: -0.3452, M: 8.349, S: 0.11384},
                {h: 90, L: -0.3413, M: 9.327, S: 0.11358},
                {h: 95, L: -0.3394, M: 10.324, S: 0.11388},
                {h: 100, L: -0.3396, M: 11.335, S: 0.11469},
                {h: 110, L: -0.3430, M: 13.477, S: 0.11689},
                {h: 120, L: -0.3509, M: 15.662, S: 0.11940}
            ]
        };

        // Accurate WHO classification cutoffs
        function getStatus(zScore) {
            if (zScore < -3.0) return { status: 'SAM', class: 'status-sam', text: 'Severe Acute Malnutrition (WHZ < -3)' };
            if (zScore >= -3.0 && zScore < -2.0) return { status: 'MAM', class: 'status-mam', text: 'Moderate Acute Malnutrition (-3 ≤ WHZ < -2)' };
            if (zScore >= -2.0 && zScore <= +2.0) return { status: 'Normal', class: 'status-normal', text: 'Normal (-2 ≤ WHZ ≤ +2)' };
            if (zScore > +2.0 && zScore <= +3.0) return { status: 'Overweight', class: 'status-overweight', text: 'Overweight (+2 < WHZ ≤ +3)' };
            return { status: 'Obesity', class: 'status-obesity', text: 'Obesity (WHZ > +3)' };
        }

        // Linear interpolation function for LMS parameters
        function interpolate(table, height) {
            for (let i = 0; i < table.length - 1; i++) {
                if (height >= table[i].h && height <= table[i+1].h) {
                    const ratio = (height - table[i].h) / (table[i+1].h - table[i].h);
                    return {
                        L: table[i].L + ratio * (table[i+1].L - table[i].L),
                        M: table[i].M + ratio * (table[i+1].M - table[i].M),
                        S: table[i].S + ratio * (table[i+1].S - table[i].S)
                    };
                }
            }
            return table[table.length - 1]; // Extrapolate to max height
        }

        // WHO LMS Z-score calculation (precise formula)
        function calculateWHZ(weight, height, sex) {
            const table = WHO_LMS[sex];
            const lms = interpolate(table, height);
            
            const L = lms.L;
            const M = lms.M;
            const S = lms.S;
            const X = weight;
            
            let Z;
            if (Math.abs(L) < 1e-6) {
                // L = 0 case
                Z = Math.log(X / M) / S;
            } else {
                // Standard LMS formula
                Z = Math.sign(L) * Math.pow(((Math.pow(X / M, L) - 1) / (L * S)), 1 / L);
            }
            
            return parseFloat(Z.toFixed(2));
        }

        document.getElementById('whzForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const sex = document.getElementById('sex').value;
            const height = parseFloat(document.getElementById('height').value);
            const weight = parseFloat(document.getElementById('weight').value);
            
            if (!sex || isNaN(height) || isNaN(weight)) {
                alert('Please fill all fields correctly');
                return;
            }
            
            const zscore = calculateWHZ(weight, height, sex);
            const status = getStatus(zscore);
            
            const resultDiv = document.getElementById('result');
            const colorRef = document.getElementById('colorRef');
            
            document.getElementById('zScore').textContent = `WHZ = ${zscore}`;
            document.getElementById('statusText').textContent = status.text;
            
            resultDiv.className = `result ${status.class}`;
            resultDiv.style.display = 'block';
            colorRef.style.display = 'flex';
            
            resultDiv.scrollIntoView({ behavior: 'smooth' });
        });
    </script>
</body>
</html>
