<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✅ WHZ Calculator - FIXED & ACCURATE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            border-radius: 24px;
            padding: 40px;
            max-width: 520px;
            width: 100%;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
        }
        h1 { 
            text-align: center;
            color: #2d3748; 
            font-size: 2em;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #718096;
            margin-bottom: 30px;
            font-size: 1.1em;
        }
        .input-group {
            margin-bottom: 25px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #4a5568;
            font-weight: 600;
            font-size: 1.1em;
        }
        select, input {
            width: 100%;
            padding: 18px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 18px;
            transition: all 0.3s;
        }
        select:focus, input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102,126,234,0.1);
        }
        button {
            width: 100%;
            padding: 20px;
            background: linear-gradient(135deg, #48bb78, #38a169);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(72,187,120,0.4);
        }
        .result {
            margin-top: 30px;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            display: none;
            animation: slideIn 0.5s ease-out;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .status-sam { background: linear-gradient(135deg, #f56565, #e53e3e); color: white; }
        .status-mam { background: linear-gradient(135deg, #ed8936, #dd6b20); color: white; }
        .status-normal { background: linear-gradient(135deg, #48bb78, #38a169); color: white; }
        .status-overweight { background: linear-gradient(135deg, #fabf8f, #f6ad55); color: #744210; }
        .status-obesity { background: linear-gradient(135deg, #fc8181, #f56565); color: white; }
        .z-score { font-size: 44px; font-weight: 800; margin: 15px 0; }
        .status-badge { 
            display: inline-block; 
            padding: 15px 35px; 
            border-radius: 50px; 
            font-size: 22px; 
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 15px 0;
        }
        .cutoffs { 
            font-size: 16px; 
            opacity: 0.95; 
            margin-top: 15px;
            font-weight: 500;
        }
        @media (max-width: 480px) {
            .container { padding: 30px 20px; }
            .z-score { font-size: 36px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 WHZ Calculator</h1>
        <p class="subtitle">✅ Fixed - WHO Standards (0-59 months)</p>
        
        <form id="whzForm">
            <div class="input-group">
                <label>👶 Gender</label>
                <select id="sex" required>
                    <option value="">Select Gender</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                </select>
            </div>
            
            <div class="input-group">
                <label>📏 Height/Length (cm)</label>
                <input type="number" id="height" step="0.1" min="45" max="121" placeholder="e.g. 45.0" required>
            </div>
            
            <div class="input-group">
                <label>⚖️ Weight (kg)</label>
