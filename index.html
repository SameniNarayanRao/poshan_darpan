<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poshan Darpan - Robust Analysis</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f0f4f8; font-family: sans-serif; padding: 20px; }
        .card { max-width: 450px; margin: auto; background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: #1e40af; color: white; padding: 20px; text-align: center; }
        .body { padding: 20px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #444; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; }
        .btn { width: 100%; padding: 12px; background: #2563eb; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .result { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; text-align: center; }
        .status-1 { background: #fee2e2; color: #b91c1c; border: 2px solid #ef4444; }
        .status-2 { background: #ffedd5; color: #9a3412; border: 2px solid #f97316; }
        .status-3 { background: #dcfce7; color: #15803d; border: 2px solid #22c55e; }
        .status-4 { background: #fef9c3; color: #854d0e; border: 2px solid #eab308; }
        .status-5 { background: #fee2e2; color: #991b1b; border: 2px solid #dc2626; }
    </style>
</head>
<body>

<div class="card">
    <div class="header"><h2>Poshan Darpan</h2></div>
    <div class="body">
        <div class="input-group"><label>Age (Months)</label><input type="number" id="age"></div>
        <div class="input-group"><label>Sex (1=M, 2=F)</label><select id="sex"><option value="1">1 (Male)</option><option value="2">2 (Female)</option></select></div>
        <div class="input-group"><label>Height (cm)</label><input type="number" id="height"></div>
        <div class="input-group"><label>Weight (kg)</label><input type="number" step="0.1" id="weight"></div>
        <button class="btn" onclick="lookup()">Check Status</button>
        <div id="res" class="result"></div>
    </div>
</div>

<script>
    async function lookup() {
        const uAge = parseInt(document.getElementById('age').value);
        const uSex = parseInt(document.getElementById('sex').value);
        const uHeight = parseInt(document.getElementById('height').value);
        const uWeight = parseFloat(document.getElementById('weight').value);

        if (isNaN(uAge) || isNaN(uHeight) || isNaN(uWeight)) {
            alert("Please enter valid numbers");
            return;
        }

        try {
            const response = await fetch('Data.csv');
            const text = await response.text();
            // Split lines and filter out empty ones
            const rows = text.split(/\r?\n/).filter(line => line.trim() !== "");
            
            let foundStatus = null;

            // Start from 1 to skip header 
            for (let i = 1; i < rows.length; i++) {
                const cols = rows[i].split(',').map(c => c.trim());
                if (cols.length < 5) continue;

                // Data mapping: Age[0], Sex[1], Height[2], Weight[3], Status[4] 
                const cAge = parseInt(cols[0]);
                const cSex = parseInt(cols[1]);
                const cHeight = parseInt(cols[2]);
                const cWeight = parseFloat(cols[3]);
                const cStatus = parseInt(cols[4]);

                // Precision match: check if the difference is negligible
                if (cAge === uAge && cSex === uSex && cHeight === uHeight && Math.abs(cWeight - uWeight) < 0.01) {
                    foundStatus = cStatus;
                    break;
                }
            }

            const resDiv = document.getElementById('res');
            if (foundStatus !== null) {
                const map = { 1: "SAM", 2: "MAM", 3: "Normal", 4: "Overweight", 5: "Obesity" };
                resDiv.style.display = "block";
                resDiv.className = `result status-${foundStatus}`;
                resDiv.innerHTML = `<strong>Result: ${map[foundStatus]}</strong><br>Found in Data.csv`;
            } else {
                resDiv.style.display = "block";
                resDiv.className = "result";
                resDiv.innerHTML = "No matching record found for these exact values.";
            }
        } catch (e) {
            alert("Error reading Data.csv. Ensure it is in the same folder.");
        }
    }
</script>

</body>
</html>
